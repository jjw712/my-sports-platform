services:
  n8n:
    container_name: n8n-2
    restart: always
    image: docker.n8n.io/n8nio/n8n
    volumes:
      - /home/hackartist/data/devel/github.com/hackartists/local-infra/n8n:/home/node/.n8n
    ports:
      - 5678:5678
    environment:
      TZ: Asia/Seoul
      DB_TYPE: "sqlite"
      DB_SQLITE_DATABASE: "/home/node/.n8n/database.sqlite"
      GENERIC_TIMEZONE: "Asia/Seoul"
      WEBHOOK_URL: http://${PUBLIC_IP}


volumes:
  n8n-volume: